<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Channel – Live AIS Tracking</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'SF Mono', 'Consolas', 'Menlo', monospace; background: #0a0e14; color: #c4cad4; }
  #map { width: 100%; height: 100vh; }

  .control-panel {
    position: absolute; top: 12px; right: 12px; z-index: 1000;
    background: rgba(10, 14, 20, 0.92); border: 1px solid #1e2a3a;
    border-radius: 8px; padding: 14px; width: 320px;
    backdrop-filter: blur(10px);
  }
  .control-panel h2 { font-size: 13px; font-weight: 600; color: #7eb8da; margin-bottom: 10px; letter-spacing: 0.5px; }
  .control-panel label { font-size: 11px; color: #6b7785; display: block; margin-bottom: 3px; }
  .control-panel input[type="text"] {
    width: 100%; padding: 7px 9px; background: #121820; border: 1px solid #1e2a3a;
    border-radius: 4px; color: #c4cad4; font-family: inherit; font-size: 12px;
    margin-bottom: 8px; outline: none;
  }
  .control-panel input[type="text"]:focus { border-color: #3a7ca5; }
  .control-panel input[type="text"]::placeholder { color: #3a4550; }

  .btn {
    padding: 7px 14px; border: none; border-radius: 4px; cursor: pointer;
    font-family: inherit; font-size: 11px; font-weight: 600;
    letter-spacing: 0.3px; transition: all 0.15s;
  }
  .btn-connect { background: #1a6b3c; color: #a5e6be; }
  .btn-connect:hover { background: #1f7d46; }
  .btn-disconnect { background: #6b1a1a; color: #e6a5a5; }
  .btn-disconnect:hover { background: #7d1f1f; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .stats {
    margin-top: 10px; padding-top: 10px; border-top: 1px solid #1e2a3a;
    font-size: 11px; line-height: 1.8;
  }
  .stats .val { color: #7eb8da; font-weight: 600; }
  .status-dot {
    display: inline-block; width: 7px; height: 7px; border-radius: 50%;
    margin-right: 5px; vertical-align: middle;
  }
  .status-dot.off { background: #4a3030; }
  .status-dot.connecting { background: #a08030; animation: pulse 1s infinite; }
  .status-dot.on { background: #30a050; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  .legend {
    margin-top: 10px; padding-top: 10px; border-top: 1px solid #1e2a3a;
    font-size: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 3px 8px;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-swatch { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

  .log-panel {
    position: absolute; bottom: 12px; left: 12px; z-index: 1000;
    background: rgba(10, 14, 20, 0.92); border: 1px solid #1e2a3a;
    border-radius: 8px; padding: 10px; width: 520px; max-height: 220px;
    backdrop-filter: blur(10px); overflow: hidden;
  }
  .log-panel h3 { font-size: 11px; color: #6b7785; margin-bottom: 6px; }
  #log {
    font-size: 10px; line-height: 1.6; max-height: 185px;
    overflow-y: auto; color: #5a6570;
  }
  #log .entry { border-bottom: 1px solid #141a22; padding: 2px 0; }
  #log .ship-name { color: #7eb8da; }
  #log .sys { color: #a08030; }
  #log .err { color: #e05555; }
  #log .time { color: #3a4550; }

  .leaflet-popup-content-wrapper {
    background: rgba(10, 14, 20, 0.95) !important; border: 1px solid #1e2a3a !important;
    border-radius: 6px !important; color: #c4cad4 !important;
    font-family: 'SF Mono', 'Consolas', monospace !important;
  }
  .leaflet-popup-tip { background: rgba(10, 14, 20, 0.95) !important; }
  .leaflet-popup-content { font-size: 11px !important; line-height: 1.7 !important; margin: 10px 14px !important; }
  .popup-name { font-size: 13px; font-weight: 600; color: #7eb8da; }
  .popup-label { color: #6b7785; }
  .popup-val { color: #c4cad4; }
  .leaflet-container { background: #0d1117 !important; }
</style>
</head>
<body>

<div id="map"></div>

<div class="control-panel">
  <h2>ENGLISH CHANNEL AIS</h2>
  <label>aisstream.io API Key</label>
  <input type="text" id="apiKey" placeholder="paste your API key here" />
  <div style="display:flex; gap:8px; align-items:center;">
    <button class="btn btn-connect" id="connectBtn" onclick="toggleConnection()">Connect</button>
    <span style="font-size:11px;">
      <span class="status-dot off" id="statusDot"></span>
      <span id="statusText">Disconnected</span>
    </span>
  </div>
  <div class="stats">
    <div>Vessels tracked: <span class="val" id="vesselCount">0</span></div>
    <div>Messages/sec: <span class="val" id="msgRate">0</span></div>
    <div>Total messages: <span class="val" id="msgTotal">0</span></div>
    <div>Last update: <span class="val" id="lastUpdate">–</span></div>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:#e05555;"></div>Tanker</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#50b86c;"></div>Cargo</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#5090d0;"></div>Passenger</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#d0a030;"></div>Fishing</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#a855c0;"></div>Tug/Pilot</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#c07840;"></div>HSC</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#40b0b0;"></div>Sailing/Pleasure</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#808080;"></div>Other</div>
  </div>
</div>

<div class="log-panel">
  <h3>LIVE FEED</h3>
  <div id="log"></div>
</div>

<script>
// ── Bounding box: English Channel ──
const BBOX_SW = [48.3, -6.0];
const BBOX_NE = [51.5, 2.5];

// ── Map ──
const map = L.map('map', { center: [50.0, -1.8], zoom: 7, zoomControl: false, preferCanvas: true });
L.control.zoom({ position: 'bottomright' }).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; CARTO &copy; OSM', subdomains: 'abcd', maxZoom: 18
}).addTo(map);
L.rectangle([BBOX_SW, BBOX_NE], { color: '#3a7ca5', weight: 1, fillOpacity: 0.03, dashArray: '6,4' }).addTo(map);

// ── State ──
const vessels = new Map();
let ws = null, connected = false, manualDisconnect = false;
let msgCount = 0, msgWindow = [], reconnectTimer = null;

// ═══════════════════════════════════════
//  LOGGING — separate functions for
//  system, error, and vessel messages
// ═══════════════════════════════════════
function logSys(text) {
  _log(`<span class="sys">● ${text}</span>`);
  console.log('[SYS]', text);
}
function logErr(text) {
  _log(`<span class="err">✖ ${text}</span>`);
  console.error('[ERR]', text);
}
function logShip(name, sog, cog, tag) {
  _log(`<span class="ship-name">${name}</span> [${tag}] ${sog?.toFixed(1) ?? '–'} kn ${cog?.toFixed(0) ?? '–'}°`);
}
function _log(html) {
  const el = document.getElementById('log');
  const t = new Date().toLocaleTimeString();
  const div = document.createElement('div');
  div.className = 'entry';
  div.innerHTML = `<span class="time">${t}</span> ${html}`;
  el.prepend(div);
  while (el.children.length > 80) el.removeChild(el.lastChild);
}

// ── Ship helpers ──
function shipColor(type) {
  if (type >= 80 && type <= 89) return '#e05555';
  if (type >= 70 && type <= 79) return '#50b86c';
  if (type >= 60 && type <= 69) return '#5090d0';
  if (type === 30) return '#d0a030';
  if ([31,32,50,52,53,55].includes(type)) return '#a855c0';
  if (type >= 40 && type <= 49) return '#c07840';
  if (type === 36 || type === 37) return '#40b0b0';
  return '#808080';
}
function shipTypeName(type) {
  if (type >= 80 && type <= 89) return 'Tanker';
  if (type >= 70 && type <= 79) return 'Cargo';
  if (type >= 60 && type <= 69) return 'Passenger';
  if (type === 30) return 'Fishing';
  if ([31,32].includes(type)) return 'Towing';
  if ([50,55].includes(type)) return 'Pilot';
  if ([52,53].includes(type)) return 'Tug';
  if (type >= 40 && type <= 49) return 'HSC';
  if (type === 36) return 'Sailing';
  if (type === 37) return 'Pleasure';
  return type ? 'Type ' + type : 'Unknown';
}
function navStatName(s) {
  return ['Under way','Anchored','Not under cmd','Restricted','Constrained','Moored',
    'Aground','Fishing','Sailing','Reserved','Reserved','Towing','Pushing',
    'Reserved','SART','Undefined'][s] || '?';
}
function makeIcon(hdg, color, sog) {
  const r = (hdg != null && hdg !== 511) ? hdg : 0;
  const sz = sog > 1 ? 14 : 10, op = sog > 0.5 ? 0.9 : 0.5;
  return L.divIcon({
    html: `<svg width="${sz*2}" height="${sz*2}" viewBox="0 0 28 28" xmlns="http://www.w3.org/2000/svg">
      <g transform="rotate(${r},14,14)"><polygon points="14,2 22,24 14,19 6,24" fill="${color}" opacity="${op}" stroke="#000" stroke-width="0.8"/></g></svg>`,
    iconSize: [sz*2, sz*2], iconAnchor: [sz, sz], className: ''
  });
}

// ── Handle AIS message ──
function handleMessage(msg) {
  const meta = msg.MetaData;
  if (!meta) return;
  const mmsi = meta.MMSI, lat = meta.latitude, lon = meta.longitude;
  const name = (meta.ShipName || '').trim();
  if (!lat || !lon || (lat === 0 && lon === 0)) return;

  let hdg = 511, cog = 0, sog = 0, nav = 15, type = 0, dest = '', eta = '', draft = 0;
  const mt = msg.MessageType, P = msg.Message;

  if (mt === 'PositionReport' && P?.PositionReport) {
    const r = P.PositionReport;
    hdg = r.TrueHeading ?? 511; cog = r.Cog ?? 0; sog = r.Sog ?? 0; nav = r.NavigationalStatus ?? 15;
  } else if (mt === 'ShipStaticData' && P?.ShipStaticData) {
    const s = P.ShipStaticData;
    type = s.Type ?? 0; dest = s.Destination ?? '';
    eta = s.Eta ? `${s.Eta.Month}-${s.Eta.Day} ${s.Eta.Hour}:${String(s.Eta.Minute||0).padStart(2,'0')}` : '';
    draft = (s.MaximumStaticDraught ?? 0) / 10;
  } else if (mt === 'StandardClassBPositionReport' && P?.StandardClassBPositionReport) {
    const r = P.StandardClassBPositionReport;
    hdg = r.TrueHeading ?? 511; cog = r.Cog ?? 0; sog = r.Sog ?? 0;
  } else if (mt === 'ExtendedClassBPositionReport' && P?.ExtendedClassBPositionReport) {
    const r = P.ExtendedClassBPositionReport;
    hdg = r.TrueHeading ?? 511; cog = r.Cog ?? 0; sog = r.Sog ?? 0; type = r.ShipType ?? 0;
  }

  msgCount++;
  msgWindow.push(Date.now());

  const ex = vessels.get(mmsi);
  if (ex) {
    const d = ex.data;
    if (hdg !== 511) d.hdg = hdg; if (cog) d.cog = cog; d.sog = sog;
    if (nav !== 15) d.nav = nav; if (type) d.type = type;
    if (dest) d.dest = dest; if (eta) d.eta = eta; if (draft) d.draft = draft;
    if (name) d.name = name; d.lat = lat; d.lon = lon;
    ex.lastSeen = Date.now();
    ex.marker.setLatLng([lat, lon]);
    ex.marker.setIcon(makeIcon(d.hdg, shipColor(d.type), d.sog));
    ex.trail.push([lat, lon]);
    if (ex.trail.length > 40) ex.trail.shift();
    if (ex.polyline) ex.polyline.setLatLngs(ex.trail);
  } else {
    const data = { mmsi, name, lat, lon, hdg, cog, sog, nav, type, dest, eta, draft };
    const marker = L.marker([lat, lon], { icon: makeIcon(hdg, shipColor(type), sog) }).addTo(map);
    marker.on('click', () => {
      const d = vessels.get(mmsi)?.data; if (!d) return;
      marker.unbindPopup();
      marker.bindPopup(`
        <div class="popup-name">${d.name || 'UNKNOWN'}</div>
        <div><span class="popup-label">MMSI:</span> <span class="popup-val">${d.mmsi}</span></div>
        <div><span class="popup-label">Type:</span> <span class="popup-val">${shipTypeName(d.type)}</span></div>
        <div><span class="popup-label">Status:</span> <span class="popup-val">${navStatName(d.nav)}</span></div>
        <div><span class="popup-label">SOG:</span> <span class="popup-val">${d.sog.toFixed(1)} kn</span></div>
        <div><span class="popup-label">COG:</span> <span class="popup-val">${d.cog.toFixed(1)}°</span></div>
        <div><span class="popup-label">Heading:</span> <span class="popup-val">${d.hdg === 511 ? '–' : d.hdg + '°'}</span></div>
        ${d.dest ? `<div><span class="popup-label">Dest:</span> <span class="popup-val">${d.dest}</span></div>` : ''}
        ${d.eta ? `<div><span class="popup-label">ETA:</span> <span class="popup-val">${d.eta}</span></div>` : ''}
        ${d.draft ? `<div><span class="popup-label">Draught:</span> <span class="popup-val">${d.draft.toFixed(1)} m</span></div>` : ''}
        <div><span class="popup-label">Pos:</span> <span class="popup-val">${d.lat.toFixed(5)}, ${d.lon.toFixed(5)}</span></div>
      `, { maxWidth: 260 }).openPopup();
    });
    const trail = [[lat, lon]];
    const polyline = L.polyline(trail, { color: shipColor(type), weight: 1.2, opacity: 0.35 }).addTo(map);
    vessels.set(mmsi, { marker, data, lastSeen: Date.now(), trail, polyline });
  }

  logShip(name || mmsi, sog, cog, mt === 'ShipStaticData' ? 'STATIC' : 'POS');
  document.getElementById('vesselCount').textContent = vessels.size;
  document.getElementById('msgTotal').textContent = msgCount.toLocaleString();
  document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
}

// ── Rates & cleanup ──
setInterval(() => {
  const now = Date.now();
  msgWindow = msgWindow.filter(t => now - t < 5000);
  document.getElementById('msgRate').textContent = (msgWindow.length / 5).toFixed(1);
}, 1000);
setInterval(() => {
  const now = Date.now();
  for (const [mmsi, v] of vessels) {
    if (now - v.lastSeen > 300000) {
      map.removeLayer(v.marker);
      if (v.polyline) map.removeLayer(v.polyline);
      vessels.delete(mmsi);
    }
  }
  document.getElementById('vesselCount').textContent = vessels.size;
}, 30000);

// ═══════════════════════════════════════
//  WEBSOCKET CONNECTION
// ═══════════════════════════════════════
function toggleConnection() { connected ? disconnect() : connect(); }

function connect() {
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) { alert('Enter your aisstream.io API key'); return; }
  setStatus('connecting');
  // Connect via local Python proxy (ais_proxy.py) since aisstream.io
  // sends non-standard WebSocket handshakes that browsers reject
  const wsUrl = 'ws://localhost:9000';
  logSys('Connecting to proxy at ' + wsUrl + ' ...');

  try { ws = new WebSocket(wsUrl); }
  catch (e) { setStatus('off'); logErr('WebSocket creation failed: ' + e.message); return; }

  ws.onopen = () => {
    logSys('Socket open. Sending subscription...');

    // Using APIKey (Python convention) — matches their docs
    const sub = {
      APIKey: apiKey,
      BoundingBoxes: [
        [ [BBOX_SW[0], BBOX_SW[1]], [BBOX_NE[0], BBOX_NE[1]] ]
      ]
    };

    const json = JSON.stringify(sub);
    console.log('Subscription JSON:', json);
    logSys('Sent: ' + json);
    ws.send(json);
    connected = true;
    setStatus('on');
  };

  let rawN = 0;
  ws.onmessage = (event) => {
    try {
      const raw = event.data;
      const msg = JSON.parse(raw);

      // Debug: log first 5 messages to console AND to the log panel
      if (rawN < 5) {
        const preview = JSON.stringify(msg).substring(0, 300);
        console.log('Msg #' + rawN + ':', preview);
        logSys('Recv #' + rawN + ': ' + preview);
        rawN++;
      }

      // Error check
      if (msg.error || msg.Error || msg.ERROR || msg.message) {
        logErr('Server says: ' + JSON.stringify(msg));
        return;
      }

      if (msg.MessageType && msg.MetaData) {
        handleMessage(msg);
      } else {
        logSys('Non-AIS message: ' + JSON.stringify(msg).substring(0, 200));
      }
    } catch (e) {
      logErr('Parse error: ' + e.message);
    }
  };

  ws.onerror = (ev) => {
    logErr('WebSocket error — open F12 console for details');
    console.error('WS error event:', ev);
  };

  ws.onclose = (ev) => {
    connected = false;
    setStatus('off');
    logSys(`Closed — code=${ev.code} reason="${ev.reason||'none'}" clean=${ev.wasClean}`);
    if (!manualDisconnect) {
      logSys('Reconnecting in 5s...');
      reconnectTimer = setTimeout(connect, 5000);
    }
  };

  manualDisconnect = false;
}

function disconnect() {
  manualDisconnect = true;
  if (reconnectTimer) clearTimeout(reconnectTimer);
  if (ws) { ws.close(); ws = null; }
  connected = false;
  setStatus('off');
  logSys('Disconnected manually');
}

function setStatus(s) {
  const d = document.getElementById('statusDot');
  const t = document.getElementById('statusText');
  const b = document.getElementById('connectBtn');
  d.className = 'status-dot ' + (s === 'on' ? 'on' : s === 'connecting' ? 'connecting' : 'off');
  t.textContent = s === 'on' ? 'Connected' : s === 'connecting' ? 'Connecting...' : 'Disconnected';
  b.textContent = s === 'on' ? 'Disconnect' : 'Connect';
  b.className = s === 'on' ? 'btn btn-disconnect' : 'btn btn-connect';
  b.disabled = (s === 'connecting');
  if (s === 'connecting') setTimeout(() => b.disabled = false, 3000);
}

// Pre-fill key
document.getElementById('apiKey').value = localStorage.getItem('aisstream_key') || '69d038ee63578ddc6d01327665ac6c73f1852596';
document.getElementById('apiKey').addEventListener('change', e => {
  localStorage.setItem('aisstream_key', e.target.value.trim());
});
</script>
</body>
</html>
